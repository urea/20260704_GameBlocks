<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameBlocks Experiments</title>
    <style>
      :root {
        color: #f6f0df;
        background: #17191b;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 22% 18%, rgba(103, 217, 192, 0.14), transparent 30%),
          linear-gradient(135deg, #17191b 0%, #202420 54%, #17191b 100%);
      }

      main {
        width: min(840px, 100%);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 6vw, 4.2rem);
        letter-spacing: 0;
      }

      p {
        max-width: 660px;
        margin: 0 0 24px;
        color: rgba(246, 240, 223, 0.74);
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      a {
        display: block;
        min-height: 176px;
        padding: 18px;
        border: 1px solid rgba(246, 240, 223, 0.14);
        border-radius: 8px;
        color: inherit;
        text-decoration: none;
        background: rgba(16, 17, 18, 0.72);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.25);
      }

      a:hover,
      a:focus-visible {
        border-color: rgba(103, 217, 192, 0.72);
        background: rgba(103, 217, 192, 0.12);
      }

      strong,
      small {
        display: block;
      }

      strong {
        font-size: 1.2rem;
      }

      small {
        margin-top: 8px;
        color: rgba(246, 240, 223, 0.64);
        line-height: 1.45;
      }

      @media (max-width: 640px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GameBlocks Experiments</h1>
      <p>Browser-based 3D game prototypes built with GameBlocks, Three.js, Vite, and Rapier3D.</p>
      <div class="grid">
        <a href="./experiments/contraption-lab/">
          <strong>Contraption Lab</strong>
          <small>Place fans, ramps, walls, and bumpers to guide a marble into the goal.</small>
        </a>
        <a href="./experiments/block-relay/">
          <strong>Relay Blocks</strong>
          <small>Build a snapped relay route and send a glowing signal across the board.</small>
        </a>
      </div>
    </main>
  </body>
</html>
